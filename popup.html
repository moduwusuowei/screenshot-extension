<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Capture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 200px;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      text-align: center;
    }
    .title {
      color: white;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .screenshot-btn {
      width: 100%;
      padding: 12px 24px;
      background: white;
      border: none;
      border-radius: 8px;
      color: #667eea;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .screenshot-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    .screenshot-btn:active {
      transform: translateY(0);
    }
    .screenshot-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      min-height: 18px;
    }
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">📸 一键网页截图助手</div>
    <button id="fullPageBtn" class="screenshot-btn">
      <span>📄</span>
      <span>截取长图</span>
    </button>
    <button id="visibleBtn" class="screenshot-btn" style="margin-top: 8px;">
      <span>🖼️</span>
      <span>截取当前屏幕</span>
    </button>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
